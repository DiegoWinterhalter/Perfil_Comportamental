function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getIntensity(pct) { if (pct >= 55) return 'extreme'; if (pct >= 40) return 'strong'; if (pct >= 30) return 'moderate'; return 'balanced'; }
function getRelationship(gap) { if (gap < 15) return 'duo'; if (gap < 30) return 'modulated'; return 'pure'; }

            <p className="text-base md:text-lg leading-relaxed" style={{ color: '#44403C' }}>Para receber seu relatório comportamental personalizado, deixe seus dados abaixo. <strong style={{ color: '#1C1917' }}>Diego Winterhalter entrará em contato pessoalmente</strong> para apresentar sua análise.</p>
          </div>
          <div className="bg-white border p-8 md:p-10 mb-6" style={{ borderColor: '#E7E5E4' }}>
            <div className="space-y-5">
              <div>
                <label className="block text-xs tracking-wider uppercase font-medium mb-2" style={{ color: '#78716C' }}>Nome completo</label>
                <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="Seu nome" className="w-full px-4 py-3.5 bg-white border outline-none text-base transition" style={{ borderColor: '#E7E5E4', color: '#1C1917' }} onFocus={(e) => e.target.style.borderColor = '#78350F'} onBlur={(e) => e.target.style.borderColor = '#E7E5E4'} />
              </div>
              <div>
                <label className="block text-xs tracking-wider uppercase font-medium mb-2" style={{ color: '#78716C' }}>Email <span style={{ color: '#B91C1C' }}>*</span></label>
                <input type="email" value={contactEmail} onChange={(e) => setContactEmail(e.target.value)} placeholder="seu@email.com" required className="w-full px-4 py-3.5 bg-white border outline-none text-base transition" style={{ borderColor: '#E7E5E4', color: '#1C1917' }} onFocus={(e) => e.target.style.borderColor = '#78350F'} onBlur={(e) => e.target.style.borderColor = '#E7E5E4'} />
              </div>
              <div>
                <label className="block text-xs tracking-wider uppercase font-medium mb-2" style={{ color: '#78716C' }}>WhatsApp <span style={{ color: '#B91C1C' }}>*</span></label>
                <input type="tel" value={contactWhatsapp} onChange={(e) => setContactWhatsapp(e.target.value)} placeholder="(54) 99999-9999" required className="w-full px-4 py-3.5 bg-white border outline-none text-base transition" style={{ borderColor: '#E7E5E4', color: '#1C1917' }} onFocus={(e) => e.target.style.borderColor = '#78350F'} onBlur={(e) => e.target.style.borderColor = '#E7E5E4'} />
              </div>
              <div>
                <label className="block text-xs tracking-wider uppercase font-medium mb-2" style={{ color: '#78716C' }}>Mensagem <span className="text-stone-400 normal-case font-normal">(opcional)</span></label>
                <textarea value={contactMessage} onChange={(e) => setContactMessage(e.target.value)} placeholder="Algo que você gostaria de compartilhar antes da análise..." rows={3} className="w-full px-4 py-3.5 bg-white border outline-none text-base transition resize-none" style={{ borderColor: '#E7E5E4', color: '#1C1917' }} onFocus={(e) => e.target.style.borderColor = '#78350F'} onBlur={(e) => e.target.style.borderColor = '#E7E5E4'} />
              </div>
            </div>
            <button onClick={handleSubmit} disabled={!canSubmit} className="w-full mt-7 text-white font-medium py-4 tracking-wide transition hover:opacity-90 flex items-center justify-center gap-2" style={{ backgroundColor: '#1C1917', opacity: canSubmit ? 1 : 0.4, cursor: canSubmit ? 'pointer' : 'not-allowed' }}>
              {submitStatus === 'submitting' ? (<><Loader2 className="w-4 h-4 animate-spin" />Enviando...</>) : 'Enviar e receber análise'}
            </button>
            <p className="text-xs text-center mt-4" style={{ color: '#78716C' }}>Seus dados são confidenciais e usados apenas para apresentar sua análise.</p>
          </div>
        </div>
      </div>
    );
  }

  if (screen === 'thanks') {
    return (
      <div className="min-h-screen p-6 py-12 flex items-center">
        <div className="max-w-xl mx-auto w-full">
          <div className="text-center">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full mb-8" style={{ backgroundColor: '#FEF3C7' }}>
              <CheckCircle2 className="w-8 h-8" style={{ color: '#78350F' }} />
            </div>
            <div className="text-xs tracking-[0.3em] uppercase font-medium mb-3" style={{ color: '#78350F' }}>Recebido com sucesso</div>
            <div className="w-12 h-px mx-auto mb-8" style={{ backgroundColor: '#78350F' }} />
            <h1 className="font-serif text-4xl md:text-5xl mb-6 leading-tight" style={{ color: '#1C1917' }}>{userName ? `Obrigado, ${userName.split(' ')[0]}` : 'Obrigado pela sua participação'}</h1>
            <p className="text-base md:text-lg leading-relaxed mb-8" style={{ color: '#44403C' }}>Seu perfil comportamental foi processado e está sendo analisado. <strong style={{ color: '#1C1917' }}>Diego Winterhalter entrará em contato em breve</strong> via WhatsApp para apresentar pessoalmente sua análise, explicar os achados e responder suas dúvidas.</p>
            <div className="bg-white border p-7 mb-8 text-left" style={{ borderColor: '#E7E5E4' }}>
              <div className="text-xs tracking-[0.25em] uppercase font-medium mb-3" style={{ color: '#78350F' }}>Por que apresentação pessoal?</div>
              <p className="text-sm leading-relaxed" style={{ color: '#44403C' }}>A análise comportamental traz nuances que precisam de contexto. Em vez de te entregar um relatório frio, Diego conduz uma conversa onde os achados ganham sentido prático para a sua vida e seu trabalho — especialmente em vendas, liderança e relacionamentos.</p>
            </div>
            <button onClick={restart} className="inline-flex items-center gap-2 px-6 py-3 border bg-white transition hover:bg-stone-50 text-sm" style={{ borderColor: '#E7E5E4', color: '#44403C' }}><RotateCcw className="w-4 h-4" />Refazer avaliação</button>
          </div>
          <div className="mt-16 pt-8 border-t text-center" style={{ borderColor: '#E7E5E4' }}>
            <div className="mb-3"><LogoDW size="sm" /></div>
            <div className="font-serif text-lg mb-1" style={{ color: '#1C1917' }}>Diego Winterhalter</div>
            <div className="text-xs tracking-[0.25em] uppercase font-medium" style={{ color: '#78350F' }}>Performance Mental Aplicada a Vendas</div>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
